<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>注文内容の確認 - さっつーのAIエージェント</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 40px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .product-info { background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .btn { display: block; width: 100%; padding: 15px; background: #88b09b; color: white; text-align: center; text-decoration: none; border-radius: 30px; font-weight: bold; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ご注文内容の最終確認</h2>
        <div class="product-info">
            <p><strong>商品名：</strong> {{ product.name }}</p>
            <p><strong>支払い金額：</strong> ￥{{ product.price }}（税込）</p>
            <p><strong>引渡時期：</strong> 決済完了後、直ちにダウンロード可能</p>
        </div>
        <form action="/dummy_pay" method="POST">
            <button type="submit" class="btn">規約に同意して支払う（テスト）</button>
        </form>
        <p style="font-size: 12px; color: #666; margin-top: 20px;">
            ※これはテスト用画面です。実際の決済は発生しません。<br>
            <a href="https://sattu-ai-agent.com/tokutei-shoutorihiki/" target="_blank">特定商取引法に基づく表記</a>
        </p>
    </div>
</body>
</html>
